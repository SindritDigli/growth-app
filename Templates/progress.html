<!DOCTYPE html>
<html>
<head>
    <title>Linea di Miglioramento</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Linea di Miglioramento</h1>

{% if alert %}
    <div style="color: red; font-weight: bold; margin-bottom: 10px;">
        {{ alert }}
    </div>
{% endif %}

<canvas id="progressChart" width="900" height="400"></canvas>

<p>Giorni tracciati: {{ total_days }}</p>

<form method="POST">
    <button name="value" value="1">+ Miglioramento</button>
    <button name="value" value="0">= Mantenimento</button>
    <button name="value" value="-1">- Peggioramento</button>
</form>

<br>
<a href="/delete_last_point">Elimina Ultimo Giorno</a> |
<a href="/reset_progress">Resetta Grafico</a> |
<a href="/save_progress">Salva Grafico</a> |
<a href="/progress_history">Storico Grafici</a>

<br><br>
<a href="/">Torna alla Home</a>

<script>

const xValues = {{ x_values | tojson }};
const yValues = {{ cumulative | tojson }};
const deltas = {{ deltas | tojson }};
const movingAverage = {{ moving_average | tojson }};

// Colore marker in base al delta
const pointColors = deltas.map(d => {
    if (d === 1) return "green";
    if (d === -1) return "red";
    return "gray";
});

new Chart(document.getElementById("progressChart"), {
    type: "line",
    data: {
        labels: xValues,
        datasets: [
            {
                label: "Livello Cumulativo",
                data: yValues,
                borderColor: "black",
                borderWidth: 2,
                fill: false,
                tension: 0,
                pointBackgroundColor: pointColors,
                pointRadius: 5
            },
            {
                label: "Media Mobile (5 giorni)",
                data: movingAverage,
                borderColor: "blue",
                borderWidth: 2,
                fill: false,
                tension: 0.3,
                pointRadius: 0
            }
        ]
    },
    options: {
        responsive: false,
        scales: {
            x: {
                title: {
                    display: true,
                    text: "Giorni"
                }
            },
            y: {
                title: {
                    display: true,
                    text: "Livello cumulativo"
                },
                ticks: {
                    stepSize: 1
                }
            }
        }
    }
});

</script>

</body>
</html>
